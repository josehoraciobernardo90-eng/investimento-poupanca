kind = "web"
previewPath = "/"
title = "Cofre Capital"
version = "1.0.0"
id = "artifacts/cofre"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20213
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cofre run dev"

[services.env]
PORT = "20213"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cofre", "run", "build"]
publicDir = "artifacts/cofre/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
